<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dev4ones.space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-hero: #a8c4d8;
      --black: #0a0a0a;
      --white: #ffffff;
      --font-serif: 'Gloock', Georgia, serif;
      --font-sans: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--black);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 1.1rem 2.5rem;
      background: var(--blue-hero);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 0.9rem;
      color: var(--black);
      text-decoration: none;
      margin-right: auto;
    }

    .nav-link {
      font-family: var(--font-sans);
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--black);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .nav-link:hover { text-decoration: underline; }

    /* HERO */
    .hero {
      background: var(--blue-hero);
      display: flex;
      flex-direction: column;
      padding: 3rem 2.5rem 2rem;
      min-height: unset;
    }

    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(3.5rem, 9vw, 7.8rem);
      font-weight: 400;
      color: var(--black);
      line-height: 1.0;
      letter-spacing: -0.02em;
      padding-top: 0.5rem;
    }

    .hero-links {
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding-top: 1.5rem;
    }

    .hero-service-btn {
      display: inline-block;
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 3.8vw, 2.8rem);
      font-weight: 400;
      color: var(--black);
      background: transparent;
      border: 1.5px solid var(--black);
      border-radius: 999px;
      padding: 0.5rem 2rem 0.6rem;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      line-height: 1.2;
    }

    .hero-service-btn:hover {
      background: var(--black);
      color: var(--blue-hero);
    }

    /* FOOTER */
    footer {
      background: var(--black);
      color: var(--white);
      padding: 4rem 2.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 600px) {
      footer { grid-template-columns: 1fr; }
    }

    .footer-left h2 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 4.5vw, 3rem);
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 1.25rem;
    }

    .footer-left a {
      color: var(--white);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 0.88rem;
      font-family: var(--font-sans);
    }

    .footer-right {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding-top: 0.25rem;
    }

    .footer-right p,
    .footer-right a,
    .footer-right .or {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .footer-right em { font-style: italic; }

    .footer-right a {
      color: var(--white);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .footer-right .or { opacity: 0.6; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">dev4ones.space</a>
    <a href="#get-in-touch" class="nav-link">About</a>
    <a href="cloud-hosting.html" class="nav-link">Cloud Hosting</a>
  </nav>

  <section class="hero">
    <h1 class="hero-title">Everything You Need</h1>
    <div class="hero-links">
      <a href="cloud-hosting.html" class="hero-service-btn">Cloud Hosting</a>
      <a href="mailto:webmaster@dev4ones.space" class="hero-service-btn">Zygarde Software</a>
    </div>
  </section>

  <footer id="get-in-touch">
    <div class="footer-left">
      <h2>Get In<br>Touch</h2>
      <a href="mailto:webmaster@dev4ones.space">webmaster@dev4ones.space</a>
    </div>
    <div class="footer-right">
      <p>Already have account <em>(and subscription)</em>?</p>
      <a href="https://dev4ones.space/index.php">log into cloud hosting</a>
      <p class="or">or</p>
      <a href="mailto:webmaster@dev4ones.space">contact us to recover account/get help</a>
    </div>
  </footer>

  <script>
    if (window.location.hash === '#get-in-touch') {
      window.addEventListener('load', () => {
        document.getElementById('get-in-touch').scrollIntoView({ behavior: 'smooth' });
      });
    }
  </script>

</body>
</html>
